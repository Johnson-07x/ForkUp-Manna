# Database (Aiven MySQL - values injected as Render env vars)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning for free-tier (limited connections)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Flyway - enabled in prod to manage schema migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Logging
logging.level.root=WARN
logging.level.in.johnson.forkupmanna=INFO
logging.level.org.flywaydb=INFO

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# CORS - set to your Netlify URL via env var
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger - disable in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
