spring.application.name=ForkUp-Manna

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/forkup_manna
spring.datasource.username=root
spring.datasource.password=admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway - disabled in dev; ddl-auto=update handles schema automatically
spring.flyway.enabled=false

# JWT
jwt.secret=my-super-secret-key-that-should-be-at-least-32-characters-long-for-security
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Logging
logging.level.root=INFO
logging.level.in.johnson.forkupmanna=DEBUG

# Server
server.port=8080
server.servlet.context-path=/api/v1

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger/OpenAPI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs    
