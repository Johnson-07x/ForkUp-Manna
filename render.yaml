services:
  - type: web
    name: forkup-manna-backend
    runtime: java
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar -Dspring.profiles.active=prod target/ForkUp-Manna-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/v1/auth/health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
